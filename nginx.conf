upstream echoroom_backend {
    ip_hash;
    server backend-1:5000 max_fails=2 fail_timeout=10s;
    server backend-2:5000 max_fails=2 fail_timeout=10s;
}

server {
    listen 80;
    server_name localhost;

    # WebSocket upgrade support for Socket.io
    location /socket.io/ {
        proxy_pass http://echoroom_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Health check endpoint (used by LB simulation to verify node readiness)
    location /health {
        proxy_pass http://echoroom_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API and static files
    location / {
        proxy_pass http://echoroom_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
